<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوصلة المتدرب التقني - م/ عادل الشمري</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --gold-light: #f1d279;
            --gold-main: #d4af37;
            --gold-dark: #aa8c2c;
            --bg-dark: #121212;
            --text-light: #ffffff;
            --blue-gps: #2196F3;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-light); overflow: hidden; }

        /* الشاشة الترحيبية */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px; transition: opacity 0.8s ease;
        }

        .start-btn {
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-light));
            color: #000; border: none; padding: 15px 50px; border-radius: 30px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }

        /* الواجهة الرئيسية */
        #main-app { display: none; height: 100%; flex-direction: column; position: relative; }

        .search-nav {
            position: absolute; top: 15px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 5px; border-radius: 15px;
            border: 2px solid var(--gold-main); box-shadow: 0 0 20px rgba(212,175,55,0.4);
        }
        input {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            font-size: 1.2rem; text-align: center; font-weight: bold;
            background: transparent; color: var(--gold-light); outline: none;
        }

        #map { flex: 1; width: 100%; height: 100vh; }

        .controls { position: absolute; bottom: 25px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .btn-action {
            background: linear-gradient(45deg, #1a1a1a, #333); color: var(--gold-main);
            border: 2px solid var(--gold-main); width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer;
        }

        /* بطاقة المعلومات وزر البدء */
        .info-card {
            position: absolute; bottom: 100px; left: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.98); color: #333; padding: 18px;
            border-radius: 15px; z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--gold-main); box-shadow: 0 -5px 30px rgba(0,0,0,0.5);
        }

        .go-btn {
            background: #27ae60; color: white; border: none; padding: 12px 30px;
            border-radius: 25px; font-size: 1.1rem; font-weight: bold; margin-top: 15px;
            cursor: pointer; display: none; width: 100%; box-shadow: 0 4px 10px rgba(39,174,96,0.3);
        }

        .dest-detail { background: #fff9e6; padding: 12px; border-radius: 10px; color: #444; font-weight: bold; margin-top: 10px; border: 1px solid var(--gold-light); }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div style="max-width: 500px;">
        <h1 style="font-size: 2.2rem; color: var(--gold-main); margin-bottom: 15px;">بوصلة المتدرب التقني</h1>
        <p style="color: #ccc; line-height: 1.6;">مرحباً بك في الكلية التقنية بالقريات! دليلك الذكي للوصول إلى وجهتك بدقة.</p>
        <button class="start-btn" onclick="startApp()">البدء</button>
    </div>
    <div style="position: absolute; bottom: 30px; color: var(--gold-main); font-weight: bold;">من إعداد: م/ عادل الشمري</div>
</div>

<div id="main-app">
    <div class="search-nav">
        <input type="text" id="roomInput" placeholder="رقم القاعة أو اسم المرفق..." maxlength="10">
    </div>

    <div class="info-card" id="infoCard">
        <h3 id="bldgName" style="color: #004a80; margin: 0;"></h3>
        <div class="dest-detail" id="targetDetail"></div>
        <button id="goBtn" class="go-btn" onclick="startNavigation()">بدء الملاحة 🚀</button>
        <div id="distanceText" style="margin-top:10px; font-size: 0.85rem; color: #27ae60; font-weight: bold;"></div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="map.zoomIn()">+</button>
        <button class="btn-action" onclick="map.zoomOut()">-</button>
        <button class="btn-action" onclick="centerOnUser()" style="color: var(--blue-gps);">🎯</button>
        <button class="btn-action" onclick="location.reload()">🔄</button>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylineoffset@1.1.1/leaflet.polylineoffset.min.js"></script>

<script>
    const buildings = {
        "1": { name: "مبنى الأنشطة والمسرح", coords: [31.3885802, 37.3098097], desc: "الأنشطة والمسرح" },
        "2": { name: "مبنى الدعم الفني والشبكات", coords: [31.3884981, 37.3106472], desc: "الدعم الفني والشبكات" },
        "3": { name: "مبنى الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052], desc: "الدراسات العامة والمحاسبة" },
        "4": { name: "مبنى الكافتيريا", coords: [31.3892940, 37.3111964], desc: "الكافتيريا" },
        "5": { name: "مبنى المصلى", coords: [31.3896953, 37.3114700], desc: "المصلى" },
        "6": { name: "مبنى ورش التقنية الميكانيكية", coords: [31.3903633, 37.3105369], desc: "ورش الميكانيكا" },
        "7": { name: "مبنى قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989], desc: "التقنية الميكانيكية" },
        "8": { name: "مبنى العمادة وشؤون المتدربين", coords: [31.3898115, 37.3093759], desc: "العمادة" }
    };

    const keywordMap = { "بوفيه": "4", "كافتيريا": "4", "مطعم": "4", "مصلى": "5", "صلاة": "5", "عمادة": "8", "شؤون": "8", "مسرح": "1", "أنشطة": "1" };

    function startApp() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            map.invalidateSize();
            enableLiveTracking();
        }, 800);
    }

    // إعداد الخريطة مع تفعيل التحكم اليدوي بالكامل
    const map = L.map('map', { zoomControl: false, scrollWheelZoom: true, dragging: true }).setView([31.3893496, 37.3102727], 18);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);

    let userMarker, destMarker, routeLine, isNavigating = false;

    function enableLiveTracking() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(updateUserMarker, null, { enableHighAccuracy: true });
    }

    function updateUserMarker(pos) {
        const p = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) {
            userMarker = L.circleMarker(p, { radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1 }).addTo(map);
        } else {
            userMarker.setLatLng(p);
        }
        
        if (isNavigating) {
            map.setView(p, 19); // التتبع التلقائي عند بدء الملاحة
        }
        if (destMarker) updateRoute(p, destMarker.getLatLng());
    }

    function centerOnUser() {
        if (userMarker) map.setView(userMarker.getLatLng(), 19);
    }

    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim().toUpperCase();
        for (let k in keywordMap) { if (val.includes(k)) { processSearch(keywordMap[k], "keyword", k); return; } }
        if (val.length === 10) {
            const bId = val[4]; const floorDigit = val[5]; const isWorkshop = isNaN(val.charAt(9));
            if (bId === "6" && parseInt(floorDigit) > 1) { alert("مبنى 6 أرضي وأول فقط."); return; }
            processSearch(bId, isWorkshop ? "workshop" : "code", { floor: floorDigit, room: val.substring(isWorkshop ? 6 : 7) });
        }
    });

    function processSearch(bId, type, data) {
        const target = buildings[bId];
        if (!target) return;

        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('goBtn').style.display = 'block';
        document.getElementById('bldgName').innerText = target.name;
        
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(target.coords).addTo(map).bindPopup(target.name).openPopup();
        map.flyTo(target.coords, 19);

        let floorLabel = "";
        if (["1", "4", "5", "8"].includes(bId)) {
            floorLabel = `وجهة المرفق: ${target.name}`;
        } else {
            const fNames = { "0": "الأرضي", "1": "الأول", "2": "الثاني", "3": "الثالث" };
            floorLabel = `الدور ${fNames[data.floor] || data.floor} — رقم ${data.room}`;
        }
        document.getElementById('targetDetail').innerHTML = `📌 <b>${floorLabel}</b>`;
    }

    function startNavigation() {
        isNavigating = true;
        document.getElementById('goBtn').innerText = "جاري الملاحة...";
        document.getElementById('goBtn').style.background = "#555";
        centerOnUser();
    }

    function updateRoute(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        // رسم خط ملاحة بسهم واضح
        routeLine = L.polyline([start, end], { 
            color: '#d4af37', weight: 8, opacity: 0.8, dashArray: '1, 15' 
        }).addTo(map);
        
        const dist = map.distance(start, end).toFixed(0);
        document.getElementById('distanceText').innerText = `المسافة المتبقية: ${dist} متر`;
    }
</script>
</body>
</html>
