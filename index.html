<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الملاحة الذكي - الكلية التقنية بالقريات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #004a80; --blue-gps: #2196F3; --accent: #ffd700; --danger: #e74c3c; --success: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; }
        
        .search-nav {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;
            font-size: 1.1rem; text-align: center; font-weight: bold; box-sizing: border-box;
            color: var(--primary);
        }

        #map { height: 100vh; width: 100%; }

        .controls {
            position: absolute; bottom: 25px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .btn-action {
            background: white; border: none; width: 60px; height: 60px;
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer;
        }

        .info-card {
            position: absolute; bottom: 100px; left: 12px; right: 12px;
            background: white; padding: 20px; border-radius: 15px;
            z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--primary); box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .error-card { border-bottom: 6px solid var(--danger); }
        .info-card h3 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .dest-detail { background: #f0f7ff; padding: 10px; border-radius: 8px; color: var(--blue-gps); font-weight: bold; margin-top: 10px; }
        .special-note { color: #e67e22; font-weight: bold; font-size: 0.9rem; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="search-nav">
    <input type="text" id="roomInput" placeholder="رقم القاعة، الورشة، أو (كافتيريا، عمادة...)" maxlength="10">
    <div id="statusMsg" style="margin-top: 5px; font-size: 0.8rem; text-align: center; color: #888;"></div>
</div>

<div class="info-card" id="infoCard">
    <h3 id="bldgName"></h3>
    <p id="bldgDesc" style="margin: 10px 0; color: #555; font-size: 0.95rem;"></p>
    <div class="dest-detail" id="targetDetail"></div>
    <div id="specialNote" class="special-note"></div>
    <div id="distanceText" style="margin-top:8px; font-size: 0.85rem; color: #27ae60;"></div>
</div>

<div class="controls">
    <button class="btn-action" onclick="enableLiveTracking()">🎯</button>
    <button class="btn-action" onclick="location.reload()">🔄</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const buildings = {
        "1": { name: "مبنى 1 - مبنى الأنشطة والمسرح", coords: [31.3885802, 37.3098097], desc: "المسرح الرئيسي وقاعات الأنشطة الفعاليات." },
        "2": { name: "مبنى 2 - قسم الدعم الفني وأنظمة الشبكات", coords: [31.3884981, 37.3106472], desc: "معامل الحاسب الآلي وصيانة الشبكات." },
        "3": { name: "مبنى 3 - قسم الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052], desc: "قاعات اللغة الإنجليزية والرياضيات والمحاسبة." },
        "4": { name: "مبنى 4 - الكافتيريا", coords: [31.3892940, 37.3111964], desc: "منطقة الخدمات الغذائية (فطور وبوفيه)." },
        "5": { name: "مبنى 5 - المصلى", coords: [31.3896953, 37.3114700], desc: "جامع الكلية الرئيسي (صلاة ومسجد)." },
        "6": { name: "مبنى 6 - ورش التقنية الميكانيكية", coords: [31.3903633, 37.3105369], desc: "ورش تخصصية للمحركات والمركبات." },
        "7": { name: "مبنى 7 - قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989], desc: "القاعات النظرية والمكاتب الإدارية للقسم." },
        "8": { name: "مبنى 8 - العمادة", coords: [31.3898115, 37.3093759], desc: "مبنى الإدارة الرئيسي وشؤون المتدربين." }
    };

    const keywordMap = {
        "كافتيريا": "4", "مطعم": "4", "بوفية": "4", "فطور": "4", "بوفيه": "4",
        "مصلى": "5", "صلاة": "5", "مسجد": "5", "جامع": "5",
        "شؤون": "8", "شئون": "8", "العمادة": "8", "العميد": "8",
        "الأنشطة": "1", "المسرح": "1", "فعاليات": "1"
    };

    const map = L.map('map', { zoomControl: false }).setView([31.3893496, 37.3102727], 18);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);

    let userMarker, destMarker, routeLine;

    function enableLiveTracking() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(updateUserMarker, (err) => {}, { enableHighAccuracy: true });
        document.getElementById('statusMsg').innerText = "التتبع المباشر مفعل 🛰️";
    }

    function updateUserMarker(pos) {
        const p = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) userMarker = L.circleMarker(p, { radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1 }).addTo(map);
        else userMarker.setLatLng(p);
        if (destMarker) updateNavigation(p, destMarker.getLatLng());
    }

    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim().toUpperCase();
        const card = document.getElementById('infoCard');
        
        // 1. البحث بالكلمات المفتاحية
        for (let keyword in keywordMap) {
            if (val.includes(keyword.toUpperCase())) {
                executeSearch(keywordMap[keyword], "keyword", keyword);
                return;
            }
        }

        // 2. البحث بالأكواد (10 خانات)
        if (val.length === 10) {
            const lastChar = val.charAt(9);
            const isWorkshop = isNaN(lastChar); // إذا كان ينتهي بحرف فهو ورشة

            const bId = val[4]; 
            const floorDigit6 = val[5]; // الرقم السادس
            const floorDigit7 = val[6]; // الرقم السابع (لأكواد الورش)
            const floorDigit8 = val[7]; // الرقم الثامن (للتأكد في القاعات العادية)

            if (isWorkshop) {
                // منطق الورش: الرقم 6 و 7 هما الدور
                // عادة يكونان متطابقين (مثل 11) ليدلا على الدور الأول
                const workshopFloor = floorDigit6; 
                executeSearch(bId, "workshop", { floor: workshopFloor, room: val.substring(7) });
            } else {
                // منطق القاعات العادية: التأكد من تطابق 6 مع 8
                if (floorDigit6 !== floorDigit8) {
                    showError("رقم غير متناسق! الدور (الرقم 6) يجب أن يطابق فئة القاعة (الرقم 8).");
                    return;
                }
                executeSearch(bId, "code", { floor: floorDigit6, room: val.substring(7) });
            }
        } else {
            card.style.display = 'none';
        }
    });

    function executeSearch(bId, type, data) {
        const target = buildings[bId];
        const card = document.getElementById('infoCard');
        if (!target) return;

        card.classList.remove('error-card');
        card.style.display = 'block';
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(target.coords).addTo(map).bindPopup(target.name).openPopup();
        map.flyTo(target.coords, 19);

        document.getElementById('bldgName').innerText = target.name;
        document.getElementById('bldgDesc').innerText = target.desc;
        const noteEl = document.getElementById('specialNote');
        const detailEl = document.getElementById('targetDetail');
        
        noteEl.innerText = (bId === "8") ? "⚠️ ملاحظة: مكتب شؤون المتدربين يقع في الدور الأول." : "";

        if (type === "workshop" || type === "code") {
            let fName = data.floor === '0' ? "الأرضي" : (data.floor === '1' ? "الأول" : "الثاني");
            let label = (type === "workshop") ? "الورشة" : "القاعة";
            detailEl.innerHTML = `📌 توجه إلى <b>${fName}</b> — ${label} رقم <b>${data.room}</b>`;
        } else {
            detailEl.innerHTML = `📍 وجهة الخدمات: <b>${data}</b>`;
        }

        if (userMarker) updateNavigation(userMarker.getLatLng(), target.coords);
        else enableLiveTracking();
    }

    function showError(msg) {
        const card = document.getElementById('infoCard');
        card.classList.add('error-card');
        card.style.display = 'block';
        document.getElementById('bldgName').innerText = "تنبيه بالنظام!";
        document.getElementById('bldgDesc').innerText = msg;
        document.getElementById('targetDetail').innerHTML = "يرجى مراجعة الجدول أو التأكد من الرقم.";
        document.getElementById('specialNote').innerText = "";
    }

    function updateNavigation(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([start, end], { color: '#2196F3', weight: 6, opacity: 0.7, dashArray: '10, 15' }).addTo(map);
        const dist = map.distance(start, end).toFixed(0);
        document.getElementById('distanceText').innerText = `المسافة: ${dist} متر`;
    }
</script>
</body>
</html>
