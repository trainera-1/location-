<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوصلة المتدرب التقني - م/ عادل الشمري</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --gold-light: #f1d279; --gold-main: #d4af37; --gold-dark: #aa8c2c;
            --bg-dark: #0b0b0b; --text-light: #ffffff; --blue-gps: #2196F3;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); overflow: hidden; width: 100%; }

        /* شاشة الترحيب - العنوان الذهبي الواضح */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; transition: opacity 0.8s ease;
        }
        .app-title { 
            font-size: 2.8rem; font-weight: 900; color: var(--gold-main);
            background: linear-gradient(to bottom, #f1d279 0%, #d4af37 50%, #aa8c2c 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 15px rgba(212, 175, 55, 0.4); margin-bottom: 10px; width: 100%;
        }
        .start-btn { background: linear-gradient(45deg, var(--gold-dark), var(--gold-light)); color: #000; border: none; padding: 18px 70px; border-radius: 40px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 25px rgba(212, 175, 55, 0.4); }

        /* الواجهة الرئيسية */
        #main-app { display: none; height: 100%; flex-direction: column; position: relative; }
        .search-nav {
            position: absolute; top: 15px; left: 12px; right: 12px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 4px; border-radius: 16px; border: 2px solid var(--gold-main);
        }
        input { width: 100%; padding: 14px; border: none; font-size: 1.15rem; text-align: center; background: transparent; color: var(--gold-light); outline: none; font-weight: bold; }

        #status-bar {
            position: absolute; top: 90px; left: 12px; right: 12px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--gold-main);
            border-radius: 12px; padding: 10px; display: none; text-align: center;
        }

        #map { flex: 1; width: 100%; height: 100vh; }

        /* أيقونة المستخدم وشعاع التوجيه */
        .user-location-icon {
            position: relative; width: 20px; height: 20px;
            background: var(--blue-gps); border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .user-heading-beam {
            position: absolute; top: -45px; left: -15px; width: 50px; height: 50px;
            background: radial-gradient(ellipse at bottom, rgba(33, 150, 243, 0.6) 0%, rgba(33, 150, 243, 0) 70%);
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%); transform-origin: bottom center;
            pointer-events: none; transition: transform 0.2s ease;
        }

        .info-card {
            position: absolute; bottom: 30px; left: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.98); color: #222; padding: 20px;
            border-radius: 20px; z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--gold-main); box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
        }
        .go-btn { background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 1.1rem; cursor: pointer; }

        .side-controls { position: absolute; top: 50%; right: 15px; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .btn-side { background: rgba(0, 0, 0, 0.85); color: var(--gold-main); border: 2px solid var(--gold-main); width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .signature { position: absolute; bottom: 40px; color: var(--gold-main); font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <h1 class="app-title">بوصلة المتدرب التقني</h1>
        <p style="color: #bbb; line-height: 1.6; margin-bottom: 35px; font-size: 1.1rem;">مرحباً بك في الكلية التقنية بالقريات!<br>دليلك الذكي للوصول إلى وجهتك بدقة واحترافية.</p>
        <button class="start-btn" onclick="requestPermissions()">البدء</button>
    </div>
    <div class="signature">من إعداد: م/ عادل الشمري</div>
</div>

<div id="main-app">
    <div class="search-nav">
        <input type="text" id="roomInput" placeholder="بحث (مصلى، مسرح، أو رقم القاعة...)" maxlength="20">
    </div>

    <div id="status-bar">
        <div style="color: var(--gold-light); font-weight: bold; font-size: 0.95rem;">📍 <span id="statusBldg"></span></div>
        <div style="color: #27ae60; font-size: 0.85rem; font-weight: bold; margin-top: 4px;">المسافة: <span id="statusDist">جاري التحديد...</span></div>
    </div>

    <div class="info-card" id="infoCard">
        <h3 id="bldgName" style="color: #004a80; margin: 0; font-size: 1.25rem;"></h3>
        <div id="targetDetail" style="background: #fff9e3; padding: 12px; border-radius: 12px; margin-top: 12px; border: 1px solid var(--gold-light); font-weight: bold; color: #333; line-height: 1.5;"></div>
        <button id="goBtn" class="go-btn" onclick="startJourney()">انطلاق 🚀</button>
    </div>

    <div class="side-controls">
        <button class="btn-side" onclick="centerOnUser()">🎯</button>
        <button class="btn-side" onclick="map.zoomIn()">+</button>
        <button class="btn-side" onclick="map.zoomOut()">-</button>
        <button class="btn-side" onclick="location.reload()">🔄</button>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const collegeCenter = [31.3893496, 37.3102727];
    // إعداد الخريطة
    const map = L.map('map', { zoomControl: false, maxZoom: 20 }).setView(collegeCenter, 18);
    L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);

    const buildings = {
        "1": { name: "مبنى 1 - الأنشطة والمسرح", coords: [31.3885802, 37.3098097] },
        "2": { name: "مبنى 2 - الدعم الفني والشبكات", coords: [31.3884981, 37.3106472] },
        "3": { name: "مبنى 3 - الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052] },
        "4": { name: "مبنى 4 - الكافتيريا والبوفيه", coords: [31.3892940, 37.3111964] },
        "5": { name: "مبنى 5 - المصلى والجامع", coords: [31.3896953, 37.3114700] },
        "6": { name: "مبنى 6 - ورش الميكانيكا", coords: [31.3903633, 37.3105369] },
        "7": { name: "مبنى 7 - قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989] },
        "8": { name: "مبنى 8 - العمادة وشؤون المتدربين", coords: [31.3898115, 37.3093759] }
    };

    const keywordMap = { "بوفيه": "4", "كافتيريا": "4", "مصلى": "5", "عمادة": "8", "مسرح": "1" };

    let userMarker, destMarker, routeLine, isNavigating = false;
    let lastUserCoords = null;
    let userHeading = 0;

    async function requestPermissions() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') window.addEventListener('deviceorientation', handleOrientation);
            } catch (e) { console.error(e); }
        } else { window.addEventListener('deviceorientation', handleOrientation); }
        startApp();
    }

    function startApp() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            map.invalidateSize();
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }, 800);
    }

    function handleOrientation(event) {
        userHeading = event.webkitCompassHeading || (360 - event.alpha);
        if (userMarker) {
            const beam = document.querySelector('.user-heading-beam');
            if (beam) beam.style.transform = `rotate(${userHeading}deg)`;
        }
    }

    function updatePos(pos) {
        lastUserCoords = [pos.coords.latitude, pos.coords.longitude];
        const userIcon = L.divIcon({
            className: 'custom-user-icon',
            html: `<div class="user-location-icon"><div class="user-heading-beam" style="transform: rotate(${userHeading}deg)"></div></div>`,
            iconSize: [20, 20], iconAnchor: [10, 10]
        });

        if (!userMarker) userMarker = L.marker(lastUserCoords, { icon: userIcon }).addTo(map);
        else { userMarker.setLatLng(lastUserCoords); userMarker.setIcon(userIcon); }
        
        if (destMarker) drawDirectRoute(lastUserCoords, destMarker.getLatLng());
        
        // الحل البرمجي لمشكلة الزوم:
        // نستخدم map.getZoom() للحفاظ على مستوى التكبير الذي اختاره المتدرب حالياً
        if (isNavigating) {
            map.setView(lastUserCoords, map.getZoom()); 
        }
    }

    function drawDirectRoute(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([start, end], { color: '#d4af37', weight: 7, opacity: 0.8, dashArray: '1, 15' }).addTo(map);
        const dist = map.distance(start, end).toFixed(0);
        const txt = dist < 6 ? "وصلت لوجهتك" : dist + " متر";
        if (isNavigating) document.getElementById('statusDist').innerText = txt;
    }

    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim().toUpperCase();
        for (let k in keywordMap) {
            if (val.includes(k)) { executeSearch(keywordMap[k], "key", k); return; }
        }
        if (val.length === 10) {
            const bId = val[4]; 
            const floor = val[5]; 
            const char7 = val[6]; 
            const char8 = val[7]; 
            const isWorkshop = isNaN(val.charAt(9));

            if (isWorkshop) {
                if (floor !== char7) { alert("تنبيه: الرقم السادس (الدور) لا يتطابق مع السابع (ترميز الورشة)."); return; }
            } else {
                if (floor !== char8) { alert("تنبيه: الرقم السادس (الدور) لا يتطابق مع الثامن (رقم القاعة)."); return; }
            }
            executeSearch(bId, isWorkshop ? "workshop" : "code", { f: floor, r: val.substring(isWorkshop ? 6 : 7) });
        }
    });

    function executeSearch(bId, type, data) {
        const b = buildings[bId]; if (!b) return;
        isNavigating = false;
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('bldgName').innerText = b.name;
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(b.coords).addTo(map).bindPopup(b.name).openPopup();
        map.flyTo(b.coords, 19);

        let floorTxt = "";
        const fNames = { "0": "الأرضي", "1": "الأول", "2": "الثاني", "3": "الثالث" };
        if (type === "key") floorTxt = `وجهة المرفق: ${b.name}`;
        else {
            let desc = (bId === "7" && data.f === "3") ? "مكاتب إدارية" : "قاعات / معامل";
            if (bId === "6" || type === "workshop") desc = "ورش الميكانيكا";
            floorTxt = `الدور ${fNames[data.f] || data.f} — ${desc}<br>رقم: ${data.r}`;
        }
        document.getElementById('targetDetail').innerHTML = `📌 <b>${floorTxt}</b>`;
        if (lastUserCoords) drawDirectRoute(lastUserCoords, b.coords);
    }

    function startJourney() {
        isNavigating = true;
        document.getElementById('infoCard').style.display = 'none';
        document.getElementById('status-bar').style.display = 'block';
        document.getElementById('statusBldg').innerText = document.getElementById('bldgName').innerText;
        centerOnUser(); // عند البدء فقط نذهب للزوم 19 كوضع افتراضي
    }

    function centerOnUser() { 
        if (lastUserCoords) map.setView(lastUserCoords, 19); 
    }
</script>
</body>
</html>
