<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دليل المتدرب - الكلية التقنية بالقريات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #004a80; --blue-gps: #2196F3; --accent: #ffd700; --success: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; }
        
        /* واجهة البحث الاحترافية */
        .search-nav {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;
            font-size: 1.1rem; text-align: center; font-weight: bold; box-sizing: border-box;
            color: var(--primary);
        }

        #map { height: 100vh; width: 100%; }

        /* أزرار التحكم الجانبية */
        .controls {
            position: absolute; bottom: 25px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .btn-action {
            background: white; border: none; width: 60px; height: 60px;
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer;
        }

        /* لوحة التوجيه والتعريف بالمبنى */
        .info-card {
            position: absolute; bottom: 100px; left: 12px; right: 12px;
            background: white; padding: 20px; border-radius: 15px;
            z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--primary); box-shadow: 0 -5px 25px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .info-card h3 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .info-card p { margin: 10px 0; color: #555; font-size: 0.95rem; line-height: 1.4; }
        .dest-detail { background: #f0f7ff; padding: 10px; border-radius: 8px; color: var(--blue-gps); font-weight: bold; }
    </style>
</head>
<body>

<div class="search-nav">
    <input type="text" id="roomInput" placeholder="أدخل رقم القاعة أو الورشة (10 خانات)" maxlength="10">
    <div id="statusMsg" style="margin-top: 5px; font-size: 0.8rem; text-align: center; color: #888;"></div>
</div>

<div class="info-card" id="infoCard">
    <h3 id="bldgName"></h3>
    <p id="bldgDesc"></p>
    <div class="dest-detail" id="targetDetail"></div>
    <div id="distanceText" style="margin-top:8px; font-size: 0.85rem; color: #27ae60;"></div>
</div>

<div class="controls">
    <button class="btn-action" onclick="enableLiveTracking()" title="تفعيل تتبع الموقع">🎯</button>
    <button class="btn-action" onclick="location.reload()" title="إعادة تشغيل">🔄</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // الإحداثيات الدقيقة التي زودتنا بها لكل مبنى
    const buildings = {
        "1": { name: "مبنى 1 - مبنى الأنشطة والمسرح", coords: [31.3885802, 37.3098097], desc: "يضم المسرح الرئيسي وقاعات الأنشطة الطلابية والفعاليات." },
        "2": { name: "مبنى 2 - قسم الدعم الفني وأنظمة الشبكات", coords: [31.3884981, 37.3106472], desc: "مبنى متخصص بمعامل الحاسب الآلي، صيانة الشبكات والدعم التقني." },
        "3": { name: "مبنى 3 - قسم الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052], desc: "يضم قاعات اللغة الإنجليزية، الرياضيات، والمكاتب الإدارية لقسم المحاسبة." },
        "4": { name: "مبنى 4 - الكافتيريا", coords: [31.3892940, 37.3111964], desc: "منطقة استراحة المتدربين والخدمات الغذائية." },
        "5": { name: "مبنى 5 - المصلى", coords: [31.3896953, 37.3114700], desc: "جامع الكلية الرئيسي لأداء الصلاة." },
        "6": { name: "مبنى 6 - ورش التقنية الميكانيكية", coords: [31.3903633, 37.3105369], desc: "ورش تخصصية للمحركات، المركبات، والتقنيات الميكانيكية العملية." },
        "7": { name: "مبنى 7 - قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989], desc: "يضم القاعات النظرية والمكاتب الإدارية لأعضاء هيئة التدريب بقسم الميكانيكا." },
        "8": { name: "مبنى 8 - العمادة", coords: [31.3898115, 37.3093759], desc: "مبنى الإدارة الرئيسي، مكتب العميد، ووكلاء الكلية، وشؤون المتدربين." }
    };

    // إعداد الخريطة في حي الأمل - القريات
    const map = L.map('map', { zoomControl: false }).setView([31.3893496, 37.3102727], 18);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 20
    }).addTo(map);

    let userMarker, destMarker, routeLine;

    // تفعيل الـ GPS بدقة عالية
    function enableLiveTracking() {
        if (!navigator.geolocation) {
            alert("المتصفح لا يدعم تحديد الموقع.");
            return;
        }
        navigator.geolocation.watchPosition(updateUserMarker, (err) => {
            console.error(err);
            alert("يرجى التأكد من تفعيل الموقع (GPS) والسماح للمتصفح بالوصول إليه.");
        }, { enableHighAccuracy: true, maximumAge: 0 });
        document.getElementById('statusMsg').innerText = "تم تفعيل التتبع المباشر 🛰️";
    }

    function updateUserMarker(pos) {
        const p = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) {
            userMarker = L.circleMarker(p, { radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1 }).addTo(map);
        } else {
            userMarker.setLatLng(p);
        }
        if (destMarker) updateNavigation(p, destMarker.getLatLng());
    }

    // تحليل الأكواد (أرقام فقط أو أرقام وحروف)
    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim();
        if (val.length === 10) {
            const bldgId = val[4]; // الرقم الخامس
            const floorId = val[5]; // الرقم السادس
            const roomCode = val.substring(7); // آخر 3 خانات (قد تكون أرقام أو حروف)

            const target = buildings[bldgId];
            if (target) {
                let floorName = "";
                if (floorId === '0') floorName = "الدور الأرضي";
                else if (floorId === '1') floorName = "الدور الأول";
                else if (floorId === '2') floorName = "الدور الثاني";
                else floorName = `الدور ${floorId}`;

                showDestination(target, roomCode, floorName);
            } else {
                alert("رقم المبنى غير موجود في النظام.");
            }
        }
    });

    function showDestination(bldg, room, floor) {
        if (destMarker) map.removeLayer(destMarker);
        
        destMarker = L.marker(bldg.coords).addTo(map).bindPopup(bldg.name).openPopup();
        map.flyTo(bldg.coords, 19);

        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('bldgName').innerText = bldg.name;
        document.getElementById('bldgDesc').innerText = bldg.desc;
        
        // التمييز بين القاعة والورشة بناءً على نوع الكود
        const label = isNaN(room) ? "الورشة" : "القاعة";
        document.getElementById('targetDetail').innerHTML = `📌 توجه إلى <b>${floor}</b> — ${label} رقم <b>${room}</b>`;
        
        if (userMarker) updateNavigation(userMarker.getLatLng(), bldg.coords);
        else enableLiveTracking(); // ابدأ الملاحة إذا لم تكن مفعلة
    }

    function updateNavigation(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([start, end], { color: '#2196F3', weight: 6, opacity: 0.7, dashArray: '10, 15', lineCap: 'round' }).addTo(map);
        const distance = map.distance(start, end).toFixed(0);
        document.getElementById('distanceText').innerText = `المسافة المتبقية: ${distance} متر`;
    }
</script>

</body>
</html>
