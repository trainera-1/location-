<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام الملاحة الدقيق - كلية القريات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #004a80; --blue-gps: #2196F3; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        /* واجهة البحث العلوي */
        .nav-header {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 15px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }
        input {
            width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px;
            font-size: 1.2rem; text-align: center; font-weight: bold; box-sizing: border-box;
        }

        #map { height: 100vh; width: 100%; }

        /* زر الملاحة الملوّن */
        .nav-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            background: white; border: none; width: 65px; height: 65px;
            border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer;
        }

        .instruction-box {
            position: absolute; bottom: 110px; left: 15px; right: 15px;
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px;
            z-index: 1000; display: none; text-align: center; border-bottom: 4px solid var(--blue-gps);
        }
    </style>
</head>
<body>

<div class="nav-header">
    <input type="text" id="roomInput" placeholder="أدخل رقم القاعة (10 أرقام)" pattern="\d*">
    <div id="status" style="margin-top: 8px; color: var(--primary); font-size: 0.9rem; font-weight: bold; text-align: center;"></div>
</div>

<div class="instruction-box" id="guide">
    <b id="targetName"></b><br>
    <span id="distText">جاري حساب المسافة...</span>
</div>

<button class="nav-btn" onclick="startNavigation()">🚀</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // إحداثيات الكلية التقنية بالقريات - حي الأمل
    const collegeLoc = [31.33415, 37.34842];
    
    // إعداد الخريطة
    const map = L.map('map', { zoomControl: false }).setView(collegeLoc, 18);

    // طبقة الأقمار الصناعية عالية الوضوح
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 20
    }).addTo(map);

    // توزيع المباني (إحداثيات دقيقة فوق المباني)
    const buildings = {
        "1": { name: "مبنى 1 - القاعات", pos: [31.33365, 37.34950] },
        "2": { name: "مبنى 2 - المختبرات", pos: [31.33420, 37.34980] },
        "3": { name: "مبنى 3 - الورش", pos: [31.33485, 37.34940] },
        "4": { name: "مبنى 4 - الكافتيريا", pos: [31.33525, 37.34850] },
        "5": { name: "مبنى 5 - المصلى", pos: [31.33500, 37.34755] },
        "6": { name: "مبنى 6 - القاعات", pos: [31.33455, 37.34715] },
        "7": { name: "مبنى 7 - القاعات", pos: [31.33385, 37.34735] },
        "8": { name: "مبنى 8 - الإدارة", pos: [31.33345, 37.34845] }
    };

    let userMarker, destMarker, routeLine;

    // تتبع الموقع بدقة متناهية
    function startNavigation() {
        if (!navigator.geolocation) {
            alert("جوالك لا يدعم نظام تحديد المواقع.");
            return;
        }

        navigator.geolocation.watchPosition(updateUserPos, handleLocError, {
            enableHighAccuracy: true, // تفعيل الدقة القصوى (GPS)
            maximumAge: 0,
            timeout: 10000
        });
        
        document.getElementById('status').innerText = "جاري التتبع الدقيق عبر الأقمار الصناعية...";
    }

    function updateUserPos(pos) {
        const latlng = [pos.coords.latitude, pos.coords.longitude];
        
        if (!userMarker) {
            userMarker = L.circleMarker(latlng, {
                radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1
            }).addTo(map);
        } else {
            userMarker.setLatLng(latlng);
        }

        map.setView(latlng, 19); // زوم قريب جداً على المتدرب
        if (destMarker) updateRoute(latlng, destMarker.getLatLng());
    }

    // فك التشفير والبحث
    document.getElementById('roomInput').addEventListener('input', function(e) {
        if (e.target.value.length === 10) {
            const bId = e.target.value[4];
            const target = buildings[bId];
            if (target) {
                setDestination(target);
            }
        }
    });

    function setDestination(bldg) {
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(bldg.pos).addTo(map).bindPopup(bldg.name).openPopup();
        
        document.getElementById('guide').style.display = 'block';
        document.getElementById('targetName').innerText = bldg.name;
        
        if (userMarker) updateRoute(userMarker.getLatLng(), bldg.pos);
        else startNavigation(); // ابدأ الملاحة فوراً إذا لم تكن مفعلة
    }

    function updateRoute(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([start, end], {
            color: '#2196F3', weight: 7, opacity: 0.8, lineCap: 'round', dashArray: '1, 12'
        }).addTo(map);

        const dist = map.distance(start, end).toFixed(0);
        document.getElementById('distText').innerText = `المسافة المتبقية: ${dist} متر`;
    }

    function handleLocError(err) {
        alert("يرجى التأكد من تشغيل الـ GPS في جوالك والسماح للمتصفح بالوصول لموقعك الدقيق.");
    }
</script>

</body>
</html>
