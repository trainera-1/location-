<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوصلة المتدرب التقني - م/ عادل الشمري</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --gold-light: #f1d279;
            --gold-main: #d4af37;
            --gold-dark: #aa8c2c;
            --bg-dark: #121212;
            --text-light: #ffffff;
            --blue-gps: #2196F3;
            --danger: #e74c3c;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: var(--text-light); overflow: hidden; }

        /* الشاشة الترحيبية */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box;
            transition: opacity 0.8s ease;
        }

        .welcome-content { max-width: 500px; animation: fadeIn 1.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .app-title {
            font-size: 2.2rem; color: var(--gold-main); margin-bottom: 10px;
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .welcome-msg { font-size: 1.05rem; line-height: 1.6; margin-bottom: 30px; color: #ccc; }
        .welcome-msg b { color: var(--gold-light); }

        .start-btn {
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-light));
            color: #000; border: none; padding: 15px 50px; border-radius: 30px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); transition: 0.3s;
        }

        .signature { position: absolute; bottom: 30px; font-size: 1.1rem; color: var(--gold-main); font-weight: bold; }

        /* الواجهة الرئيسية */
        #main-app { display: none; height: 100%; flex-direction: column; }

        .search-nav {
            position: absolute; top: 15px; left: 10px; right: 10px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 5px; border-radius: 15px;
            border: 2px solid var(--gold-main); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }
        input {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            font-size: 1.1rem; text-align: center; font-weight: bold;
            background: transparent; color: var(--gold-light); outline: none;
        }

        #map { flex: 1; width: 100%; height: 100vh; }

        .controls { position: absolute; bottom: 25px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .btn-action {
            background: linear-gradient(45deg, #1a1a1a, #333); color: var(--gold-main);
            border: 2px solid var(--gold-main); width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 26px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .info-card {
            position: absolute; bottom: 100px; left: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.98); color: #333; padding: 18px;
            border-radius: 15px; z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--gold-main); box-shadow: 0 -5px 30px rgba(0,0,0,0.5);
        }
        .error-card { border-bottom: 6px solid var(--danger); }
        .dest-detail { 
            background: #fff9e6; padding: 12px; border-radius: 10px; 
            color: #444; font-weight: bold; margin-top: 10px; 
            border: 1px solid var(--gold-light); line-height: 1.5;
        }
        .bldg-title { color: #004a80; font-weight: 800; font-size: 1.2rem; margin: 0; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <h1 class="app-title">بوصلة المتدرب التقني</h1>
        <div class="welcome-msg">
            مرحباً بك يا <b>بطل المستقبل</b> في الكلية التقنية بالقريات! 🚀<br>
            دليلك الذكي للوصول إلى القاعات، الورش، والمرافق الخدمية بسهولة تامة.
        </div>
        <button class="start-btn" onclick="startApp()">ابدأ الرحلة</button>
    </div>
    <div class="signature">من إعداد: م/ عادل الشمري</div>
</div>

<div id="main-app">
    <div class="search-nav">
        <input type="text" id="roomInput" placeholder="رقم القاعة أو اسم المرفق (مطعم، شؤون...)" maxlength="10">
    </div>

    <div class="info-card" id="infoCard">
        <h3 id="bldgName" class="bldg-title"></h3>
        <p id="bldgDesc" style="margin: 8px 0; color: #666; font-size: 0.9rem;"></p>
        <div class="dest-detail" id="targetDetail"></div>
        <div id="specialNote" style="color: #e67e22; font-weight: bold; margin-top:5px; font-size:0.85rem;"></div>
        <div id="distanceText" style="margin-top:8px; font-size: 0.8rem; color: #27ae60;"></div>
    </div>

    <div class="controls">
        <button class="btn-action" onclick="enableLiveTracking()">🎯</button>
        <button class="btn-action" onclick="location.reload()">🔄</button>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const buildings = {
        "1": { name: "مبنى الأنشطة والمسرح", coords: [31.3885802, 37.3098097], dept: "الأنشطة والمسرح", desc: "يضم المسرح الرئيسي وقاعات الفعاليات والأنشطة الطلابية." },
        "2": { name: "مبنى الدعم الفني والشبكات", coords: [31.3884981, 37.3106472], dept: "الدعم الفني والشبكات", desc: "معامل الحاسب الآلي وصيانة الشبكات والدعم التقني." },
        "3": { name: "مبنى الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052], dept: "الدراسات العامة والمحاسبة", desc: "قاعات اللغة الإنجليزية والرياضيات والمحاسبة." },
        "4": { name: "مبنى 4 - الكافتيريا", coords: [31.3892940, 37.3111964], dept: "الكافتيريا", desc: "منطقة الخدمات الغذائية (فطور وبوفيه الكلية)." },
        "5": { name: "مبنى 5 - المصلى", coords: [31.3896953, 37.3114700], dept: "المصلى", desc: "جامع الكلية الرئيسي (صلاة ومسجد)." },
        "6": { name: "مبنى 6 - ورش التقنية الميكانيكية", coords: [31.3903633, 37.3105369], dept: "الميكانيكا", desc: "ورش تخصصية للمحركات ومركبات التقنية الميكانيكية." },
        "7": { name: "مبنى 7 - قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989], dept: "التقنية الميكانيكية", desc: "القاعات النظرية والمكاتب الإدارية لقسم الميكانيكا." },
        "8": { name: "مبنى 8 - العمادة وشؤون المتدربين", coords: [31.3898115, 37.3093759], dept: "العمادة", desc: "مبنى الإدارة الرئيسي وشؤون المتدربين." }
    };

    const keywordMap = { "بوفيه": "4", "كافتيريا": "4", "مطعم": "4", "مصلى": "5", "صلاة": "5", "عمادة": "8", "شؤون": "8", "مسرح": "1", "أنشطة": "1" };

    function startApp() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            map.invalidateSize();
        }, 800);
    }

    const map = L.map('map', { zoomControl: false }).setView([31.3893496, 37.3102727], 18);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);

    let userMarker, destMarker, routeLine;

    function enableLiveTracking() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition(updateUserMarker, null, { enableHighAccuracy: true });
    }

    function updateUserMarker(pos) {
        const p = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) userMarker = L.circleMarker(p, { radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1 }).addTo(map);
        else userMarker.setLatLng(p);
        if (destMarker) updateNavigation(p, destMarker.getLatLng());
    }

    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim().toUpperCase();
        for (let k in keywordMap) { if (val.includes(k)) { executeSearch(keywordMap[k], "keyword", k); return; } }

        if (val.length === 10) {
            const bId = val[4]; 
            const floorDigit = val[5];
            const isWorkshop = isNaN(val.charAt(9));

            // منع الأدوار العليا في مبنى 6
            if (bId === "6" && parseInt(floorDigit) > 1) { showError("تنبيه: مبنى 6 يتكون من ورش فقط في الدور الأول."); return; }
            
            // التدقيق الثنائي للقاعات العادية
            if (!isWorkshop && floorDigit !== val[7]) { showError("خطأ: الدور (الخانة 6) لا يطابق رقم القاعة (الخانة 8)."); return; }
            
            executeSearch(bId, isWorkshop ? "workshop" : "code", { floor: floorDigit, room: val.substring(isWorkshop ? 6 : 7) });
        } else { document.getElementById('infoCard').style.display = 'none'; }
    });

    function executeSearch(bId, type, data) {
        const target = buildings[bId];
        const card = document.getElementById('infoCard');
        if (!target) return;

        card.classList.remove('error-card'); card.style.display = 'block';
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(target.coords).addTo(map).bindPopup(target.name).openPopup();
        map.flyTo(target.coords, 19);

        document.getElementById('bldgName').innerText = target.name;
        document.getElementById('bldgDesc').innerText = target.desc;
        
        const detailEl = document.getElementById('targetDetail');
        const noteEl = document.getElementById('specialNote');
        noteEl.innerText = "";

        // منطق المباني الخدمية (الكلمات المفتاحية)
        if (["1", "4", "5", "8"].includes(bId)) {
            detailEl.innerHTML = `📍 وجهة المرفق: <b>${target.name}</b>`;
            if (bId === "8") noteEl.innerText = "⚠️ ملاحظة: شؤون المتدربين تقع في الدور الأول.";
            return;
        }

        // بناء وصف الدور بناءً على القواعد الجديدة
        let floorLabel = "";
        
        if (bId === "7") {
            if (data.floor === "3") floorLabel = "مكاتب إدارية وقاعات نظرية لقسم التقنية الميكانيكية";
            else if (data.floor === "2") floorLabel = "قاعات نظرية / معامل / ورش";
            else if (data.floor === "1") floorLabel = "ورش";
            else floorLabel = "الدور الأرضي";
        } else if (bId === "6") {
            floorLabel = "ورش التقنية الميكانيكية";
        } else {
            // مباني 2 و 3
            if (data.floor === "3") floorLabel = `مكاتب إدارة وقاعات نظرية لقسم ${target.dept}`;
            else if (data.floor === "2" || data.floor === "1") floorLabel = "قاعات نظرية / معامل / ورش";
            else floorLabel = "الدور الأرضي";
        }

        const roomType = (type === "workshop") ? "رقم الورشة" : "رقم القاعة";
        detailEl.innerHTML = `📌 <b>${floorLabel}</b><br>${roomType}: <b>${data.room}</b>`;

        if (userMarker) updateNavigation(userMarker.getLatLng(), target.coords);
    }

    function showError(msg) {
        const card = document.getElementById('infoCard');
        card.classList.add('error-card'); card.style.display = 'block';
        document.getElementById('bldgName').innerText = "تنبيه بالنظام!";
        document.getElementById('bldgDesc').innerText = msg;
        document.getElementById('targetDetail').innerHTML = "";
    }

    function updateNavigation(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline([start, end], { color: '#d4af37', weight: 6, opacity: 0.7, dashArray: '10, 15' }).addTo(map);
        document.getElementById('distanceText').innerText = `المسافة: ${map.distance(start, end).toFixed(0)} متر`;
    }
</script>
</body>
</html>
