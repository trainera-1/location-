<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوصلة المتدرب التقني - م/ عادل الشمري</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --gold-light: #f1d279; --gold-main: #d4af37; --gold-dark: #aa8c2c;
            --bg-dark: #0b0b0b; --text-light: #ffffff; --blue-gps: #2196F3; --danger: #e74c3c;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); overflow: hidden; }

        /* شاشة الترحيب */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px; transition: opacity 0.8s ease;
        }
        .start-btn {
            background: linear-gradient(45deg, var(--gold-dark), var(--gold-light));
            color: #000; border: none; padding: 16px 60px; border-radius: 35px;
            font-size: 1.25rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(212,175,55,0.3);
        }

        /* الواجهة الرئيسية */
        #main-app { display: none; height: 100%; flex-direction: column; position: relative; }
        .search-nav {
            position: absolute; top: 15px; left: 12px; right: 12px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 4px; border-radius: 16px; border: 2px solid var(--gold-main);
        }
        input {
            width: 100%; padding: 14px; border: none; font-size: 1.15rem; text-align: center;
            background: transparent; color: var(--gold-light); outline: none; font-weight: bold;
        }

        #map { flex: 1; width: 100%; height: 100vh; }

        .info-card {
            position: absolute; bottom: 100px; left: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.98); color: #222; padding: 18px;
            border-radius: 18px; z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--gold-main); box-shadow: 0 -8px 30px rgba(0,0,0,0.4);
        }
        .go-btn { background: #27ae60; color: white; border: none; padding: 14px; border-radius: 25px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }

        .controls { position: absolute; bottom: 25px; left: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .btn-action {
            background: #1a1a1a; color: var(--gold-main); border: 2px solid var(--gold-main);
            width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .signature { position: absolute; bottom: 40px; color: var(--gold-main); font-weight: bold; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div style="max-width: 400px;">
        <h1 style="font-size: 2.2rem; background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900;">بوصلة المتدرب التقني</h1>
        <p style="color: #bbb; line-height: 1.6; margin-bottom: 30px;">نظام الملاحة الذكي لتوجيهك عبر ممرات الكلية الآمنة بجانب المباني.</p>
        <button class="start-btn" onclick="startApp()">البدء</button>
    </div>
    <div class="signature">من إعداد: م/ عادل الشمري</div>
</div>

<div id="main-app">
    <div class="search-nav">
        <input type="text" id="roomInput" placeholder="قاعة، ورشة، أو (بوفيه، عمادة...)" maxlength="10">
    </div>
    <div class="info-card" id="infoCard">
        <h3 id="bldgName" style="color: #004a80; margin: 0;"></h3>
        <div id="targetDetail" style="background: #fff9e3; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid var(--gold-light); font-weight: bold;"></div>
        <button id="goBtn" class="go-btn" onclick="startNav()">بدء الملاحة الذكية 🚀</button>
        <div id="distanceText" style="margin-top:8px; font-size: 0.9rem; color: #27ae60; font-weight: bold;"></div>
    </div>
    <div class="controls">
        <button class="btn-action" onclick="map.zoomIn()">+</button>
        <button class="btn-action" onclick="map.zoomOut()">-</button>
        <button class="btn-action" onclick="centerOnUser()" style="color: var(--blue-gps);">🎯</button>
        <button class="btn-action" onclick="location.reload()">🔄</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // إحداثيات المباني (العوائق)
    const buildings = {
        "1": { name: "مبنى الأنشطة والمسرح", coords: [31.3885802, 37.3098097] },
        "2": { name: "مبنى الدعم الفني والشبكات", coords: [31.3884981, 37.3106472] },
        "3": { name: "مبنى الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052] },
        "4": { name: "مبنى الكافتيريا", coords: [31.3892940, 37.3111964] },
        "5": { name: "مبنى المصلى", coords: [31.3896953, 37.3114700] },
        "6": { name: "مبنى ورش الميكانيكا", coords: [31.3903633, 37.3105369] },
        "7": { name: "قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989] },
        "8": { name: "مبنى العمادة وشؤون المتدربين", coords: [31.3898115, 37.3093759] }
    };

    // نقاط العبور في الممرات (Waypoints) لتفادي الاصطدام
    const corridors = [
        [31.3893496, 37.3102727], // الساحة المركزية
        [31.389100, 37.310000],  // ممر بين 1 و 8
        [31.389600, 37.310800],  // ممر بين 5 و 6
        [31.388800, 37.310400]   // ممر بين 2 و 3
    ];

    const keywordMap = { "بوفيه": "4", "مصلى": "5", "عمادة": "8", "مسرح": "1" };
    const map = L.map('map', { zoomControl: false }).setView([31.3893496, 37.3102727], 18);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);

    let userMarker, destMarker, routeLine, isNav = false;

    function startApp() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            map.invalidateSize();
            if (navigator.geolocation) navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });
        }, 800);
    }

    function updatePos(pos) {
        const p = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) userMarker = L.circleMarker(p, { radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1 }).addTo(map);
        else userMarker.setLatLng(p);
        if (isNav) map.setView(p, 19);
        if (destMarker) drawSmartRoute(p, destMarker.getLatLng());
    }

    function drawSmartRoute(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        
        // خوارزمية اختيار أقرب ممر آمن إذا كان المسار يقطع مبنى
        let midPoint = corridors[0]; // افتراضياً الساحة المركزية
        let minDist = Infinity;
        
        corridors.forEach(c => {
            let d = map.distance(start, c) + map.distance(c, end);
            if (d < minDist) { minDist = d; midPoint = c; }
        });

        // رسم المسار: المتدرب -> الممر الآمن المجاور للمبنى -> الهدف
        routeLine = L.polyline([start, midPoint, end], {
            color: '#d4af37', weight: 7, opacity: 0.8, dashArray: '1, 12', lineJoin: 'round'
        }).addTo(map);
        
        document.getElementById('distanceText').innerText = `المسافة المتبقية: ${minDist.toFixed(0)} متر`;
    }

    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim().toUpperCase();
        for (let k in keywordMap) { if (val.includes(k.toUpperCase())) { showDest(keywordMap[k], k); return; } }
        if (val.length === 10) {
            const bId = val[4]; const floor = val[5]; const isW = isNaN(val.charAt(9));
            if (bId === "6" && parseInt(floor) > 1) { alert("مبنى 6 أرضي وأول فقط."); return; }
            showDest(bId, val.substring(isW ? 6 : 7));
        }
    });

    function showDest(id, room) {
        const b = buildings[id]; if (!b) return;
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('bldgName').innerText = b.name;
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(b.coords).addTo(map).bindPopup(b.name).openPopup();
        map.flyTo(b.coords, 19);
        document.getElementById('targetDetail').innerHTML = `📌 وجهة المرفق<br>رقم: ${room}`;
    }

    function startNav() { isNav = true; if (userMarker) map.setView(userMarker.getLatLng(), 19); }
    function centerOnUser() { if (userMarker) map.setView(userMarker.getLatLng(), 19); }
</script>
</body>
</html>
