<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوصلة المتدرب التقني - م/ عادل الشمري</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --gold-light: #f1d279; --gold-main: #d4af37; --gold-dark: #aa8c2c;
            --bg-dark: #0b0b0b; --text-light: #ffffff; --blue-gps: #2196F3;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); overflow: hidden; width: 100%; }

        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; transition: opacity 0.8s ease;
        }
        .app-title { font-size: 2.2rem; background: linear-gradient(to bottom, var(--gold-light), var(--gold-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; margin-bottom: 10px; }
        .start-btn { background: linear-gradient(45deg, var(--gold-dark), var(--gold-light)); color: #000; border: none; padding: 16px 60px; border-radius: 35px; font-size: 1.25rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); }
        .signature { position: absolute; bottom: 40px; color: var(--gold-main); font-weight: bold; font-size: 1.1rem; }

        #main-app { display: none; height: 100%; flex-direction: column; position: relative; }
        .search-nav {
            position: absolute; top: 15px; left: 12px; right: 12px; z-index: 1000;
            background: rgba(0, 0, 0, 0.9); padding: 4px; border-radius: 16px; border: 2px solid var(--gold-main);
        }
        input { width: 100%; padding: 14px; border: none; font-size: 1.15rem; text-align: center; background: transparent; color: var(--gold-light); outline: none; font-weight: bold; }

        #status-bar {
            position: absolute; top: 90px; left: 12px; right: 12px; z-index: 999;
            background: rgba(0, 0, 0, 0.85); border: 1px solid var(--gold-main);
            border-radius: 12px; padding: 10px; display: none; text-align: center;
        }

        #map { flex: 1; width: 100%; height: 100vh; }

        .info-card {
            position: absolute; bottom: 30px; left: 12px; right: 12px;
            background: rgba(255, 255, 255, 0.98); color: #222; padding: 20px;
            border-radius: 20px; z-index: 1000; display: none; text-align: center;
            border-bottom: 6px solid var(--gold-main); box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
        }
        .go-btn { background: linear-gradient(45deg, #27ae60, #2ecc71); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 1.1rem; cursor: pointer; }

        .side-controls { position: absolute; top: 50%; right: 15px; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        .btn-side { background: rgba(0, 0, 0, 0.85); color: var(--gold-main); border: 2px solid var(--gold-main); width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="welcome-content">
        <h1 class="app-title">بوصلة المتدرب التقني</h1>
        <p style="color: #bbb; line-height: 1.6; margin-bottom: 35px;">مرحباً بك في الكلية التقنية بالقريات!<br>دليلك الذكي للوصول إلى وجهتك بدقة واحترافية.</p>
        <button class="start-btn" onclick="startApp()">البدء</button>
    </div>
    <div class="signature">من إعداد: م/ عادل الشمري</div>
</div>

<div id="main-app">
    <div class="search-nav">
        <input type="text" id="roomInput" placeholder="أدخل رقم القاعة أو المرفق..." maxlength="10">
    </div>

    <div id="status-bar">
        <div style="color: var(--gold-light); font-weight: bold; font-size: 0.95rem;">📍 <span id="statusBldg"></span></div>
        <div style="color: #27ae60; font-size: 0.85rem; font-weight: bold; margin-top: 4px;">المسافة: <span id="statusDist">جاري تحديد الموقع...</span></div>
    </div>

    <div class="info-card" id="infoCard">
        <h3 id="bldgName" style="color: #004a80; margin: 0; font-size: 1.2rem;"></h3>
        <p id="bldgDesc" style="margin: 8px 0; color: #666; font-size: 0.9rem;"></p>
        <div id="targetDetail" style="background: #fff9e3; padding: 12px; border-radius: 12px; margin-top: 12px; border: 1px solid var(--gold-light); font-weight: bold; color: #333; line-height: 1.5;"></div>
        <button id="goBtn" class="go-btn" onclick="startJourney()">ابدأ الرحلة 🚀</button>
    </div>

    <div class="side-controls">
        <button class="btn-side" onclick="centerOnUser()">🎯</button>
        <button class="btn-side" onclick="map.zoomIn()">+</button>
        <button class="btn-side" onclick="map.zoomOut()">-</button>
        <button class="btn-side" onclick="location.reload()">🔄</button>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const buildings = {
        "1": { name: "مبنى 1 - الأنشطة والمسرح", coords: [31.3885802, 37.3098097] },
        "2": { name: "مبنى 2 - الدعم الفني والشبكات", coords: [31.3884981, 37.3106472] },
        "3": { name: "مبنى 3 - الدراسات العامة والمحاسبة", coords: [31.3888144, 37.3111052] },
        "4": { name: "مبنى 4 - الكافتيريا", coords: [31.3892940, 37.3111964] },
        "5": { name: "مبنى 5 - المصلى", coords: [31.3896953, 37.3114700] },
        "6": { name: "مبنى 6 - ورش الميكانيكا", coords: [31.3903633, 37.3105369] },
        "7": { name: "مبنى 7 - قسم التقنية الميكانيكية", coords: [31.3904349, 37.3098989] },
        "8": { name: "مبنى 8 - العمادة وشؤون المتدربين", coords: [31.3898115, 37.3093759] }
    };

    // نقاط التفاف (Nodes) في الممرات الفسيحة لتجاوز المباني
    const safeNodes = [
        [31.3893496, 37.3102727], // الساحة المركزية
        [31.389100, 37.310700],  // ممر بين 2 و 4
        [31.389800, 37.310200]   // ممر بين 6 و 7
    ];

    const keywordMap = { "بوفيه": "4", "كافتيريا": "4", "مصلى": "5", "عمادة": "8", "شؤون": "8", "مسرح": "1", "أنشطة": "1" };

    const map = L.map('map', { zoomControl: false }).setView([31.3893496, 37.3102727], 18);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);

    let userMarker, destMarker, routeLine, isNavigating = false;
    let lastUserCoords = null;

    function startApp() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            map.invalidateSize();
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
            }
        }, 800);
    }

    function updatePos(pos) {
        lastUserCoords = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) userMarker = L.circleMarker(lastUserCoords, { radius: 10, color: 'white', weight: 3, fillColor: '#2196F3', fillOpacity: 1 }).addTo(map);
        else userMarker.setLatLng(lastUserCoords);
        
        if (destMarker) calculateSmartPath(lastUserCoords, destMarker.getLatLng());
        if (isNavigating) map.setView(lastUserCoords, 19);
    }

    function calculateSmartPath(start, end) {
        if (routeLine) map.removeLayer(routeLine);
        
        // المبدأ: إذا كانت المسافة المباشرة تقطع مبنى (أقل من 50م من مركز مبنى آخر)، استخدم نقطة التفاف
        let finalPath = [start, end];
        let needsBypass = false;

        for (let id in buildings) {
            let bCoord = buildings[id].coords;
            if (id !== destMarker.buildingId && map.distance(start, bCoord) < 35) {
                needsBypass = true; break;
            }
        }

        if (needsBypass) {
            // اختيار أقرب نقطة ممر آمن
            let bestNode = safeNodes[0];
            let minDist = Infinity;
            safeNodes.forEach(node => {
                let d = map.distance(start, node);
                if (d < minDist) { minDist = d; bestNode = node; }
            });
            finalPath = [start, bestNode, end];
        }

        routeLine = L.polyline(finalPath, { color: '#d4af37', weight: 7, opacity: 0.8, dashArray: '1, 12' }).addTo(map);
        
        const totalDist = map.distance(start, end).toFixed(0);
        const displayDist = totalDist > 10 ? totalDist + " متر" : "وصلت لوجهتك";
        if (isNavigating) document.getElementById('statusDist').innerText = displayDist;
    }

    document.getElementById('roomInput').addEventListener('input', function(e) {
        let val = e.target.value.trim().toLowerCase();
        for (let k in keywordMap) { if (val.includes(k)) { executeSearch(keywordMap[k], "key", k); return; } }
        if (val.length === 10) {
            const bId = val[4]; const floor = val[5]; const isW = isNaN(val.charAt(9));
            executeSearch(bId, isW ? "workshop" : "code", { f: floor, r: val.substring(isW ? 6 : 7) });
        }
    });

    function executeSearch(bId, type, data) {
        const target = buildings[bId]; if (!target) return;
        isNavigating = false;
        document.getElementById('status-bar').style.display = 'none';
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('bldgName').innerText = target.name;
        
        if (destMarker) map.removeLayer(destMarker);
        destMarker = L.marker(target.coords).addTo(map).bindPopup(target.name).openPopup();
        destMarker.buildingId = bId;
        map.flyTo(target.coords, 19);

        let floorLabel = "";
        const fNames = { "0": "الأرضي", "1": "الأول", "2": "الثاني", "3": "الثالث" };
        if (["1", "4", "5", "8"].includes(bId)) floorLabel = `وجهة المرفق: ${target.name}`;
        else {
            let desc = (bId === "7" && data.f === "3") ? "مكاتب إدارية وقاعات نظرية" : "قاعات نظرية / معامل / ورش";
            if (bId === "6") desc = "ورش التقنية الميكانيكية";
            floorLabel = `الدور ${fNames[data.f] || data.f} — ${desc}<br>رقم: ${data.r}`;
        }
        document.getElementById('targetDetail').innerHTML = `📌 <b>${floorLabel}</b>`;
        if (lastUserCoords) calculateSmartPath(lastUserCoords, target.coords);
    }

    function startJourney() {
        isNavigating = true;
        document.getElementById('infoCard').style.display = 'none';
        document.getElementById('status-bar').style.display = 'block';
        document.getElementById('statusBldg').innerText = document.getElementById('bldgName').innerText;
        centerOnUser();
    }

    function centerOnUser() { if (lastUserCoords) map.setView(lastUserCoords, 19); }
</script>
</body>
</html>
